<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GBTI | GYM-BTI 健身人格测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — "Gym Brutalist × Candy Pop"
   ═══════════════════════════════════════════════ */
:root {
  --bg: #F5F0E8;
  --bg-warm: #EDE7DA;
  --surface: #FFFFFF;
  --surface-alt: #FFF8ED;
  --ink: #1A1A1A;
  --ink-2: #555;
  --ink-3: #999;
  --ink-4: #CCC;
  --accent: #FF4D00;
  --accent-soft: rgba(255,77,0,0.08);
  --accent-mid: rgba(255,77,0,0.15);
  --green: #00C853;
  --purple: #7C3AED;
  --blue: #2196F3;
  --pink: #E91E8A;
  --yellow: #FFC107;
  --font-mono: 'Space Mono', 'SF Mono', monospace;
  --font-cn: 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 4px 4px 0px #1A1A1A;
  --shadow-sm: 2px 2px 0px #1A1A1A;
  --shadow-accent: 4px 4px 0px var(--accent);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; min-height:100vh; overflow-x:hidden; font-family:var(--font-cn); background:var(--bg); color:var(--ink); }
#root { width:100%; min-height:100vh; }

/* Noise texture overlay */
.app::after {
  content:''; position:fixed; inset:0; z-index:9999; pointer-events:none; opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══════ ANIMATIONS ═══════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
@keyframes slideRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
@keyframes slideLeft { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
@keyframes bounceIn { 0%{opacity:0;transform:scale(0.3)} 50%{transform:scale(1.05)} 70%{transform:scale(0.95)} 100%{opacity:1;transform:scale(1)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes barGrow { from{transform:scaleX(0)} to{transform:scaleX(1)} }
@keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }
@keyframes confetti-fall {
  0% { transform:translateY(-10vh) rotate(0deg); opacity:1; }
  100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
}
@keyframes typeReveal {
  0% { width:0; } 100% { width:100%; }
}

/* ═══════ LAYOUT ═══════ */
.app { max-width:420px; margin:0 auto; min-height:100vh; position:relative; overflow:hidden; }

/* ═══════════════════════════════════════════════
   START PAGE
   ═══════════════════════════════════════════════ */
.start-page {
  min-height:100vh; display:flex; flex-direction:column;
  padding:48px 24px 32px; position:relative;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(255,77,0,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(124,58,237,0.05) 0%, transparent 50%),
    var(--bg);
}
.start-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--ink); color:var(--bg); padding:6px 14px;
  border-radius:100px; font-family:var(--font-mono); font-size:11px;
  letter-spacing:1px; font-weight:700; width:fit-content;
  animation:fadeUp 0.6s ease both;
}
.start-badge::before { content:''; width:6px; height:6px; background:var(--accent); border-radius:50%; }
.start-title {
  font-size:42px; font-weight:900; line-height:1.15; margin:20px 0 0;
  animation:fadeUp 0.7s ease 0.1s both;
}
.start-title em { font-style:normal; color:var(--accent); position:relative; }
.start-title em::after {
  content:''; position:absolute; bottom:2px; left:0; right:0; height:8px;
  background:var(--yellow); z-index:-1; border-radius:2px; opacity:0.6;
}
.start-subtitle {
  font-size:15px; color:var(--ink-2); line-height:1.7; margin-top:14px;
  animation:fadeUp 0.7s ease 0.2s both;
}

/* Character strip */
.start-strip {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:16px 0; overflow:hidden; position:relative;
}
.start-strip-inner {
  display:flex; gap:12px; animation:fadeUp 0.8s ease 0.3s both;
}
.start-char-card {
  width:72px; height:72px; border-radius:var(--radius-sm);
  border:2px solid var(--ink); background:var(--surface);
  box-shadow:var(--shadow-sm); overflow:hidden;
  animation:float 3s ease-in-out infinite;
  flex-shrink:0;
}
.start-char-card img { width:100%; height:100%; object-fit:cover; }
.start-char-card:nth-child(even) { animation-delay:0.4s; }
.start-char-card:nth-child(3n) { animation-delay:0.8s; }

/* Marquee */
.start-marquee {
  padding:14px 0; overflow:hidden; position:relative;
  animation:fadeUp 0.7s ease 0.35s both;
}
.start-marquee-track {
  display:flex; gap:24px; white-space:nowrap;
  animation:marquee 20s linear infinite;
  font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  letter-spacing:2px;
}
.start-marquee-track span { display:inline-block; }
.start-marquee-track span::before { content:'◆ '; color:var(--accent); }

.start-bottom { animation:fadeUp 0.7s ease 0.4s both; }
.start-btn {
  width:100%; padding:18px; border:2.5px solid var(--ink);
  border-radius:var(--radius); background:var(--accent);
  color:#FFF; font-family:var(--font-cn); font-size:17px;
  font-weight:900; cursor:pointer; letter-spacing:2px;
  box-shadow:var(--shadow); transition:all 0.15s;
  position:relative; overflow:hidden;
}
.start-btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0px var(--ink); }
.start-meta {
  display:flex; justify-content:center; gap:16px; margin-top:16px;
  font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  letter-spacing:1px;
}
.start-meta span { display:flex; align-items:center; gap:4px; }

/* ═══════════════════════════════════════════════
   QUESTION PAGE
   ═══════════════════════════════════════════════ */
.q-page {
  min-height:100vh; display:flex; flex-direction:column;
  padding:0 20px 28px; background:var(--bg);
}
.q-header { padding:16px 0; display:flex; align-items:center; gap:10px; }
.q-back {
  width:36px; height:36px; border-radius:var(--radius-sm);
  border:2px solid var(--ink); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; box-shadow:var(--shadow-sm);
  transition:all 0.15s; flex-shrink:0;
}
.q-back:active { transform:translate(1px,1px); box-shadow:1px 1px 0px var(--ink); }
.q-prog-wrap { flex:1; }
.q-prog-track {
  height:8px; background:var(--surface); border:1.5px solid var(--ink);
  border-radius:100px; overflow:hidden;
}
.q-prog-fill {
  height:100%; background:var(--accent); transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
  border-radius:100px;
}
.q-prog-text {
  font-family:var(--font-mono); font-size:12px; color:var(--ink-2);
  text-align:right; margin-top:4px; letter-spacing:1px;
}
.q-body { flex:1; display:flex; flex-direction:column; justify-content:center; padding:8px 0; }
.q-dim-badge {
  display:inline-flex; padding:4px 10px; border-radius:100px;
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:2px; width:fit-content; margin-bottom:12px;
}
.q-dim-EI { background:rgba(255,77,0,0.1); color:var(--accent); border:1px solid rgba(255,77,0,0.2); }
.q-dim-SN { background:rgba(124,58,237,0.1); color:var(--purple); border:1px solid rgba(124,58,237,0.2); }
.q-dim-TF { background:rgba(33,150,243,0.1); color:var(--blue); border:1px solid rgba(33,150,243,0.2); }
.q-dim-JP { background:rgba(0,200,83,0.1); color:var(--green); border:1px solid rgba(0,200,83,0.2); }
.q-num {
  font-family:var(--font-mono); font-size:56px; font-weight:700;
  color:var(--ink); line-height:1; margin-bottom:4px; opacity:0.08;
}
.q-text {
  font-size:22px; font-weight:900; line-height:1.5; margin-bottom:28px;
  color:var(--ink);
}
.q-opts { display:flex; flex-direction:column; gap:10px; }
.q-opt {
  width:100%; text-align:left; padding:16px 18px;
  border-radius:var(--radius-sm); border:2px solid var(--ink);
  background:var(--surface); color:var(--ink);
  font-family:var(--font-cn); font-size:15px; font-weight:500;
  line-height:1.5; cursor:pointer; transition:all 0.15s;
  box-shadow:var(--shadow-sm); position:relative;
  display:flex; align-items:center; gap:12px;
}
.q-opt:active { transform:translate(1px,1px); box-shadow:1px 1px 0px var(--ink); }
.q-opt:hover { background:var(--accent-soft); }
.q-opt .q-opt-letter {
  width:28px; height:28px; border-radius:50%; border:2px solid var(--ink);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:12px; font-weight:700;
  flex-shrink:0; background:var(--bg-warm);
}
.q-opt.sel {
  background:var(--accent); color:#FFF; border-color:var(--ink);
  box-shadow:var(--shadow);
}
.q-opt.sel .q-opt-letter { background:rgba(255,255,255,0.3); border-color:rgba(255,255,255,0.5); color:#FFF; }

/* ═══════════════════════════════════════════════
   CALCULATING PAGE
   ═══════════════════════════════════════════════ */
.calc-page {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:40px 24px;
  background:var(--bg);
}
.calc-icon {
  width:80px; height:80px; border-radius:20px;
  border:3px solid var(--ink); background:var(--surface);
  box-shadow:var(--shadow); display:flex; align-items:center;
  justify-content:center; font-size:36px; margin-bottom:24px;
  animation:shake 0.5s ease-in-out infinite;
}
.calc-text {
  font-size:18px; font-weight:700; text-align:center;
  margin-bottom:8px; color:var(--ink);
}
.calc-sub {
  font-family:var(--font-mono); font-size:12px; color:var(--ink-3);
  letter-spacing:2px; margin-bottom:24px;
}
.calc-dots { display:flex; gap:6px; }
.calc-dot {
  width:10px; height:10px; border-radius:50%;
  background:var(--accent); animation:pulse 1s ease-in-out infinite;
}
.calc-dot:nth-child(2) { animation-delay:0.2s; }
.calc-dot:nth-child(3) { animation-delay:0.4s; }

/* ═══════════════════════════════════════════════
   RESULT PAGE
   ═══════════════════════════════════════════════ */
.r-page {
  min-height:100vh; padding:0 0 40px;
  background:var(--bg);
}

/* Confetti */
.confetti-container { position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden; }
.confetti-piece {
  position:absolute; width:10px; height:10px; top:-20px;
  animation:confetti-fall 3s ease-in forwards;
}

/* Result Hero */
.r-hero {
  padding:32px 24px 24px; text-align:center;
  background:
    radial-gradient(ellipse at 50% 30%, var(--accent-soft) 0%, transparent 60%),
    var(--bg);
}
.r-eyebrow {
  font-family:var(--font-mono); font-size:11px; letter-spacing:4px;
  color:var(--ink-3); margin-bottom:16px;
  animation:fadeUp 0.5s ease both;
}
.r-char-wrap {
  display:flex; justify-content:center; margin-bottom:16px;
  animation:bounceIn 0.8s ease both;
}
.r-char-img {
  width:200px; height:200px; border-radius:24px;
  border:3px solid var(--ink); box-shadow:6px 6px 0px var(--ink);
  overflow:hidden; background:var(--surface);
}
.r-char-img img { width:100%; height:100%; object-fit:cover; }
.r-code {
  font-family:var(--font-mono); font-size:14px; font-weight:700;
  color:var(--accent); letter-spacing:3px; margin-bottom:4px;
  animation:fadeUp 0.6s ease 0.15s both;
}
.r-name {
  font-size:30px; font-weight:900; line-height:1.3; margin-bottom:6px;
  animation:fadeUp 0.6s ease 0.2s both;
}
.r-mbti-badge {
  display:inline-flex; gap:4px; margin-bottom:16px;
  animation:fadeUp 0.6s ease 0.25s both;
}
.r-mbti-letter {
  width:32px; height:32px; border-radius:8px; border:2px solid var(--ink);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:14px; font-weight:700;
  box-shadow:var(--shadow-sm);
}
.r-mbti-letter:nth-child(1) { background:#FFE0CC; color:var(--accent); }
.r-mbti-letter:nth-child(2) { background:#E8D5F5; color:var(--purple); }
.r-mbti-letter:nth-child(3) { background:#BBDEFB; color:var(--blue); }
.r-mbti-letter:nth-child(4) { background:#C8F7D5; color:var(--green); }
.r-quote {
  font-size:15px; color:var(--ink-2); font-style:italic; line-height:1.7;
  padding:0 12px; animation:fadeUp 0.6s ease 0.3s both;
}
.r-quote::before { content:'\201C'; font-size:24px; color:var(--accent); vertical-align:text-top; margin-right:2px; }
.r-quote::after { content:'\201D'; font-size:24px; color:var(--accent); vertical-align:text-bottom; margin-left:2px; }

/* Cards */
.r-cards { padding:0 20px; }
.r-card {
  background:var(--surface); border:2px solid var(--ink);
  border-radius:var(--radius); box-shadow:var(--shadow);
  padding:20px; margin-bottom:16px;
}
.r-card-header {
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.r-card-icon {
  width:28px; height:28px; border-radius:8px; border:1.5px solid var(--ink);
  display:flex; align-items:center; justify-content:center; font-size:14px;
  box-shadow:1px 1px 0 var(--ink); flex-shrink:0;
}
.r-card-title {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:2px; color:var(--ink-2);
}
.r-card-body {
  font-size:14px; line-height:2; color:var(--ink-2);
}

/* Dimension bars */
.r-dim-row { margin-bottom:14px; }
.r-dim-row:last-child { margin-bottom:0; }
.r-dim-header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;
}
.r-dim-labels { display:flex; justify-content:space-between; font-size:12px; }
.r-dim-label { font-family:var(--font-mono); font-size:11px; font-weight:700; }
.r-dim-label.active { color:var(--ink); }
.r-dim-label.inactive { color:var(--ink-4); }
.r-dim-pct { font-family:var(--font-mono); font-size:11px; color:var(--ink-3); }
.r-dim-track {
  height:10px; background:var(--bg-warm); border:1.5px solid var(--ink);
  border-radius:100px; overflow:hidden; position:relative;
}
.r-dim-fill {
  position:absolute; top:0; height:100%; border-radius:100px;
  transform-origin:left; animation:barGrow 0.8s ease-out both;
}
.r-dim-fill.left { left:0; }
.r-dim-fill.right { right:0; transform-origin:right; }

/* Traits section */
.r-traits-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
}
.r-trait-item {
  padding:10px 12px; background:var(--bg-warm);
  border-radius:var(--radius-sm); border:1.5px solid var(--ink-4);
}
.r-trait-emoji { font-size:18px; margin-bottom:4px; }
.r-trait-label { font-size:12px; font-weight:700; color:var(--ink); }
.r-trait-desc { font-size:11px; color:var(--ink-3); margin-top:2px; }

/* Best/Worst match */
.r-match-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.r-match-card {
  background:var(--bg-warm); border-radius:var(--radius-sm);
  border:1.5px solid var(--ink); padding:14px; text-align:center;
  box-shadow:var(--shadow-sm);
}
.r-match-label {
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:2px; margin-bottom:8px;
}
.r-match-label.best { color:var(--green); }
.r-match-label.worst { color:var(--accent); }
.r-match-img {
  width:56px; height:56px; border-radius:12px; border:1.5px solid var(--ink);
  overflow:hidden; margin:0 auto 6px; background:var(--surface);
}
.r-match-img img { width:100%; height:100%; object-fit:cover; }
.r-match-name { font-size:13px; font-weight:700; }

/* Product Recommendations */
.r-shop-section { padding:0 20px; margin-bottom:16px; }
.r-shop-header {
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.r-shop-icon {
  width:28px; height:28px; border-radius:8px; border:1.5px solid var(--ink);
  display:flex; align-items:center; justify-content:center; font-size:14px;
  box-shadow:1px 1px 0 var(--ink); flex-shrink:0; background:#FFF0E6;
}
.r-shop-title {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:2px; color:var(--ink-2);
}
.r-shop-subtitle {
  font-size:13px; color:var(--ink-3); margin-bottom:14px; line-height:1.6;
}
.r-shop-grid { display:flex; flex-direction:column; gap:10px; }
.r-shop-card {
  display:flex; align-items:center; gap:14px;
  background:var(--surface); border:2px solid var(--ink);
  border-radius:var(--radius-sm); padding:14px 16px;
  box-shadow:var(--shadow-sm); cursor:pointer;
  transition:all 0.15s; text-decoration:none; color:inherit;
  position:relative; overflow:hidden;
}
.r-shop-card:active { transform:translate(1px,1px); box-shadow:1px 1px 0px var(--ink); }
.r-shop-card:hover { background:var(--accent-soft); }
.r-shop-card::after {
  content:''; position:absolute; top:0; right:0;
  width:0; height:0; border-style:solid;
  border-width:0 28px 28px 0;
  border-color:transparent var(--accent) transparent transparent;
}
.r-shop-emoji {
  width:44px; height:44px; border-radius:12px;
  border:1.5px solid var(--ink-4); background:var(--bg-warm);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
/* Featured product card with real image */
.r-shop-card.featured {
  flex-direction:column; align-items:stretch; gap:0; padding:0;
}
.r-shop-card.featured .r-shop-img-wrap {
  width:100%; overflow:hidden; border-bottom:2px solid var(--ink);
  background:var(--bg-warm); position:relative;
}
.r-shop-card.featured .r-shop-img-wrap img {
  width:100%; height:auto; display:block;
}
.r-shop-card.featured .r-shop-img-wrap .r-shop-platform-float {
  position:absolute; top:10px; left:10px;
  font-size:10px; font-family:var(--font-mono); font-weight:700;
  padding:3px 8px; border-radius:6px; border:1.5px solid var(--ink);
  box-shadow:1px 1px 0 var(--ink);
}
.r-shop-card.featured .r-shop-bottom {
  padding:14px 16px; display:flex; align-items:center; gap:10px;
}
.r-shop-card.featured .r-shop-info { flex:1; }
.r-shop-card.featured .r-shop-name { font-size:15px; }
.r-shop-card.featured::after { border-width:0 32px 32px 0; }
.r-shop-info { flex:1; min-width:0; }
.r-shop-name {
  font-size:14px; font-weight:700; color:var(--ink);
  margin-bottom:3px; display:flex; align-items:center; gap:6px;
}
.r-shop-name .r-shop-platform {
  font-size:10px; font-family:var(--font-mono); font-weight:700;
  padding:1px 6px; border-radius:4px; white-space:nowrap;
}
.r-shop-platform.tmall { background:#FF0036; color:#FFF; }
.r-shop-platform.taobao { background:#FF5000; color:#FFF; }
.r-shop-desc {
  font-size:12px; color:var(--ink-3); line-height:1.5;
  overflow:hidden; text-overflow:ellipsis;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.r-shop-arrow {
  font-size:16px; color:var(--ink-3); flex-shrink:0;
  font-family:var(--font-mono); font-weight:700;
}
.r-shop-more {

.btn-secondary {

}
.btn-secondary:active { transform:translate(1px,1px); box-shadow:1px 1px 0px var(--ink); }
.btn-ghost {
  width:100%; padding:14px; border:none; background:transparent;
  color:var(--ink-3); font-family:var(--font-cn); font-size:14px;
  cursor:pointer; text-decoration:underline; text-underline-offset:3px;

  position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100;

  padding:20px; animation:fadeIn 0.3s ease; backdrop-filter:blur(4px);
}
.share-card {
  width:320px; background:var(--surface); border:2.5px solid var(--ink);
  border-radius:var(--radius); box-shadow:6px 6px 0px var(--ink);
  padding:28px 20px 20px; text-align:center; position:relative;
  animation:scaleIn 0.4s ease;
}
.share-close {
  position:absolute; top:10px; right:12px; width:28px; height:28px;
  border-radius:50%; border:1.5px solid var(--ink); background:var(--bg-warm);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
}
.share-char-img {
  width:120px; height:120px; border-radius:20px; border:2.5px solid var(--ink);
  box-shadow:var(--shadow); margin:0 auto 12px; overflow:hidden; background:var(--surface);

.share-char-img img { width:100%; height:100%; object-fit:cover; }
.share-name { font-size:20px; font-weight:900; margin-bottom:4px; }
.share-quote {

.share-footer {
  font-size:11px; color:var(--ink-3); margin-top:12px;

/* Toast */
.toast {
  position:fixed; top:50px; left:50%; transform:translateX(-50%);

  border-radius:var(--radius-sm); font-size:13px; font-weight:700;
  z-index:200; animation:fadeUp 0.3s ease; box-shadow:var(--shadow);

/* Utility */
.anim-delay-1 { animation-delay:0.1s !important; }
.anim-delay-2 { animation-delay:0.2s !important; }

.anim-delay-5 { animation-delay:0.5s !important; }

/* Scrollbar */
::-webkit-scrollbar { width:0; }

/* ═══════════════════════════════════════
   SCORING ENGINE
   ═══════════════════════════════════════ */
function calcResult(answers) {
  const scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  const sub = { OUT:0, IN:0 };

  answers.forEach((optIdx, qIdx) => {
    const opt = QUESTIONS[qIdx].options[optIdx];
    Object.entries(opt.score).forEach(([k,v]) => { scores[k] += v; });
    Object.entries(opt.sub).forEach(([k,v]) => { sub[k] += v; });
  });

  const mbti = [
    scores.E > scores.I ? 'E' : (scores.E === scores.I ? 'I' : 'I'),
    scores.S > scores.N ? 'S' : (scores.S === scores.N ? 'N' : 'N'),
    scores.T > scores.F ? 'T' : (scores.T === scores.F ? 'F' : 'F'),
    scores.J > scores.P ? 'J' : (scores.J === scores.P ? 'P' : 'P'),
  ];
  // Fix: proper comparison
  mbti[0] = scores.E > scores.I ? 'E' : 'I';
  mbti[1] = scores.S > scores.N ? 'S' : 'N';
  mbti[2] = scores.T > scores.F ? 'T' : 'F';
  mbti[3] = scores.J > scores.P ? 'J' : 'P';

  const mbtiStr = mbti.join('');
  const subDir = sub.OUT >= sub.IN ? 'OUT' : 'IN';

  // Find matching personality
  let match = PERSONALITIES.find(p => p.mbti === mbtiStr && p.sub === null);
  if (!match) {
    match = PERSONALITIES.find(p => p.mbti === mbtiStr && p.sub === subDir);
  }
  if (!match) {
    match = PERSONALITIES.find(p => p.mbti === mbtiStr);
  }
  if (!match) match = PERSONALITIES[0]; // fallback

  const dims = {
    EI: { left:scores.E, right:scores.I, leftLabel:'E', rightLabel:'I', winner:mbti[0], color:'#FF4D00' },
    SN: { left:scores.S, right:scores.N, leftLabel:'S', rightLabel:'N', winner:mbti[1], color:'#7C3AED' },
    TF: { left:scores.T, right:scores.F, leftLabel:'T', rightLabel:'F', winner:mbti[2], color:'#2196F3' },
    JP: { left:scores.J, right:scores.P, leftLabel:'J', rightLabel:'P', winner:mbti[3], color:'#00C853' }
  };

  return { personality: match, mbti: mbtiStr, dims, scores, sub };
}

   APP
   ═══════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('start');
  const [qi, setQi] = useState(0);
  const [answers, setAnswers] = useState({});
  const [result, setResult] = useState(null);

  const handleStart = () => { setPage('question'); setQi(0); setAnswers({}); };
  const handleAnswer = (optIdx) => {
    const na = { ...answers, [qi]: optIdx };
    setAnswers(na);
    if (qi < QUESTIONS.length - 1) {
      setQi(qi + 1);
    } else {
      setPage('calc');
      const arr = [];
      for (let i = 0; i < QUESTIONS.length; i++) arr.push(na[i] ?? 0);
      setTimeout(() => {
        setResult(calcResult(arr));
        setPage('result');
      }, 3500);
    }
  };
  const handleBack = () => { if (qi > 0) setQi(qi - 1); };
  const handleRetry = () => { setPage('start'); setQi(0); setAnswers({}); setResult(null); window.scrollTo(0,0); };

  return (
    <div className="app">
      {page === 'start' && <StartPage onStart={handleStart}/>}
      {page === 'question' && <QuestionPage qi={qi} answers={answers} onAnswer={handleAnswer} onBack={handleBack}/>}
      {page === 'calc' && <CalcPage/>}
      {page === 'result' && result && <ResultPage result={result} onRetry={handleRetry}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
